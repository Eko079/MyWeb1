<section class="section contact-section" id="contact">
  <div class="container contact-layout">
    <div>
      <p class="eyebrow reveal">Contact</p>
      <h2 class="reveal">Punya proyek yang perlu dibuat lebih tajam?</h2>
      <p class="reveal">
        Kirim ringkasan kebutuhanmu. Saya akan balas dengan langkah awal, estimasi arah, dan
        pertanyaan yang perlu dijawab berikutnya.
      </p>
      <div class="contact-links reveal">
        <a href="mailto:hello@namaanda.dev">
          <i data-lucide="mail"></i>
          <span>hello@namaanda.dev</span>
        </a>
        <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer">
          <i data-lucide="linkedin"></i>
          <span>LinkedIn</span>
        </a>
      </div>
    </div>

    <form class="contact-form reveal" data-contact-form>
      <label>
        <span>Nama</span>
        <input type="text" name="name" placeholder="Nama lengkap" required />
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="email@domain.com" required />
      </label>
      <label>
        <span>Pesan</span>
        <textarea name="message" rows="5" placeholder="Ceritakan proyeknya..." required></textarea>
      </label>
      <button class="button primary form-submit" type="submit">
        <span>Kirim Pesan</span>
        <i data-lucide="arrow-up-right"></i>
      </button>
      <p class="form-status" data-form-status aria-live="polite"></p>
    </form>
  </div>
</section>
